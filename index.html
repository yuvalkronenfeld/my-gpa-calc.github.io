<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAU EE Grade Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; display: flex; justify-content: center; padding: 20px; direction: ltr; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 100%; max-width: 850px; }
        h1 { color: #003366; text-align: center; margin-bottom: 5px; }
        
        .controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .action-btn { color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 0.9rem; font-weight: bold; display: flex; align-items: center; gap: 5px; transition: opacity 0.2s;}
        .action-btn:hover { opacity: 0.9; }
        
        .reset-grades-btn { background: #6c757d; }
        .reset-all-btn { background: #dc3545; } /* Red for full wipe */
        .undo-btn { background: #17a2b8; display: none; } 
        .sync-btn { background: #003366; }
        
        #pdf-upload { display: none; }

        .summary-banner { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: #003366; color: white; padding: 20px; border-radius: 10px; margin-bottom: 25px; text-align: center; }
        .stat-val { font-size: 2rem; font-weight: bold; }
        
        .dashboard-layout { display: flex; flex-wrap: wrap; gap: 30px; }
        .list-section { flex: 1.2; min-width: 380px; }
        .chart-section { flex: 0.8; min-width: 300px; display: flex; flex-direction: column; align-items: center; }
        
        .row { display: grid; grid-template-columns: 20px 2fr 1fr 1fr 35px; gap: 8px; margin-bottom: 8px; align-items: center; padding: 5px; border-radius: 6px; background: white; transition: background 0.2s; }
        .row:hover { background: #f8f9fa; }
        .row.dragging { opacity: 0.4; background: #e8f0fe; }
        .row.drag-over { border-top: 2px solid #003366; }
        
        .drag-handle { cursor: grab; color: #adb5bd; font-size: 1.2rem; user-select: none; display: flex; justify-content: center; }
        .drag-handle:active { cursor: grabbing; }
        
        input { padding: 8px; border: 1px solid #ddd; border-radius: 5px; width: 100%; box-sizing: border-box; }
        .hebrew-input { direction: rtl; text-align: right; font-family: system-ui, -apple-system, sans-serif; }
        
        button { cursor: pointer; border-radius: 5px; border: none; font-weight: bold; }
        .add-btn { background: #28a745; color: white; padding: 12px; width: 100%; margin: 15px 0; }
        .remove-btn { background: #ff4d4d; color: white; height: 35px; display: flex; align-items: center; justify-content: center;}
        
        canvas { max-width: 100%; margin-top: 10px; }
        .legend { margin-top: 15px; font-size: 0.85rem; color: #555; text-align: center; }
        .legend span { display: inline-block; margin: 0 5px; padding: 2px 6px; border-radius: 4px; color: white;}
        .error-msg { color: #dc3545; font-size: 0.9rem; display: none; margin-top: 10px; text-align: center;}
        
        .empty-state { text-align: center; padding: 20px; color: #6c757d; font-style: italic; background: #f8f9fa; border-radius: 6px; margin-bottom: 10px;}
    </style>
</head>
<body>
    <div class="container">
        <h1>Grade Dashboard</h1>
        
        <div class="controls">
            <button class="action-btn reset-grades-btn" onclick="clearGradesOnly()">✖ Clear Grades Only</button>
            <button class="action-btn reset-all-btn" onclick="clearEntireBoard()">🗑️ Clear All</button>
            <button class="action-btn undo-btn" id="undo-btn" onclick="undoAction()">↶ Undo</button>
            
            <input type="file" id="pdf-upload" accept="application/pdf" onchange="handlePDFUpload(event)">
            <button class="action-btn sync-btn" id="sync-ui-btn" onclick="document.getElementById('pdf-upload').click()">📄 Auto-Sync Transcript (PDF)</button>
        </div>
        
        <div class="summary-banner">
            <div><div class="stat-val" id="total-avg">0.00</div><div>Weighted Average</div></div>
            <div><div class="stat-val" id="total-credits">0</div><div>Total Credits</div></div>
        </div>

        <div class="dashboard-layout">
            <div class="list-section">
                <h3>Course List</h3>
                <div id="course-list"></div>
                <button class="add-btn" onclick="addCourse()">+ Add Course</button>
            </div>
            
            <div class="chart-section">
                <h3>Credit Weight Breakdown</h3>
                <canvas id="weightChart"></canvas>
                <div id="chart-error" class="error-msg">Diagram couldn't load, but calculator works!</div>
                <div class="legend">
                    <strong>Colors by Grade:</strong><br><br>
                    <span style="background: #28a745;">90 - 100</span> 
                    <span style="background: #17a2b8;">80 - 89</span> 
                    <span style="background: #ffc107; color: black;">70 - 79</span> 
                    <span style="background: #dc3545;">Under 70</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const initialData = [
            { id: "0509-1117", name: "כלים מתמטיים לפיזיקה", g: 97, w: 3.5 },
            { id: "0509-1118", name: "מכניקה קלאסית להנדסת חשמל", g: 87, w: 5.5 },
            { id: "0509-1724", name: "אלגברה ליניארית להנדסת חשמל ואלקטרוניקה", g: 74, w: 6.5 },
            { id: "0509-1746", name: "חשבון דיפרנציאלי ואינטגרלי 1ב' להנדסת חשמל", g: 60, w: 5.5 },
            { id: "0509-1820", name: "תכנות - (פייתון)", g: 86, w: 3.5 },
            { id: "0509-1745", name: "משוואות דיפרנציאליות רגילות להנדסת חשמל ואלקטרוניקה", g: 100, w: 4.0 },
            { id: "0509-1747", name: "חשבון דיפרנציאלי ואינטגרלי 2ב' להנדסת חשמל ואלקטרוניקה", g: 100, w: 5.5 },
            { id: "0509-1829", name: "פיזיקה (2)", g: 100, w: 5.5 },
            { id: "0509-1834", name: "מעבדה בפיזיקה", g: 98, w: 2.0 },
            { id: "0512-3561", name: "מערכות לוגיות ספרתיות", g: 85, w: 4.0 },
            { id: "0609-1004", name: "הוראה וטכנולוגיה בעידן הידע", g: 97, w: 2.0 },
            { id: "0509-2801", name: "מבוא להסתברות וסטטיסטיקה", g: 67, w: 4.0 },
            { id: "0509-2843", name: "אנליזה הרמונית", g: 89, w: 3.0 },
            { id: "0509-2844", name: "פונקציות מרוכבות", g: 90, w: 3.0 },
            { id: "0512-2830", name: "פיזיקה קוונטית ומצב מוצק", g: 90, w: 4.0 }, 
            { id: "0512-2832", name: "מעגלים ומערכות ליניאריות", g: 97, w: 5.5 },
            { id: "0609-1013", name: "מהי יהדות? מבוא למחשבת ישראל לדורותיה", g: 94, w: 2.0 } 
        ];

        let courses = [];
        let backupCourses = null; 
        let chartInstance = null;
        let dragStartIndex;

        // FIXED LOADING LOGIC: Checks if the save exists at all, not just if it's empty
        try {
            const savedData = localStorage.getItem('tau_grades_v8');
            if (savedData !== null) {
                courses = JSON.parse(savedData);
            } else {
                courses = JSON.parse(JSON.stringify(initialData));
            }
        } catch (e) {
            courses = JSON.parse(JSON.stringify(initialData));
        }

        // --- UNIVERSAL UNDO SYSTEM ---
        function saveBackup() {
            backupCourses = JSON.parse(JSON.stringify(courses));
            document.getElementById('undo-btn').style.display = 'flex';
        }

        function undoAction() {
            if(backupCourses) {
                courses = JSON.parse(JSON.stringify(backupCourses));
                backupCourses = null; 
                document.getElementById('undo-btn').style.display = 'none';
                render();
            }
        }

        // --- RESET FUNCTIONS ---
        function clearGradesOnly() {
            if(confirm("Are you sure you want to clear all grades? Your course names and weights will remain.")) {
                saveBackup();
                courses.forEach(c => c.g = ""); 
                render();
            }
        }

        function clearEntireBoard() {
            if(confirm("Are you sure you want to delete ALL courses? This will give you a completely blank sheet.")) {
                saveBackup();
                courses = []; // Empties the entire array
                render();
            }
        }

        // --- SMART PDF EXTRACTION ---
        async function handlePDFUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const syncBtn = document.getElementById('sync-ui-btn');
            const originalText = syncBtn.innerText;
            syncBtn.innerText = "⏳ Reading PDF...";
            syncBtn.disabled = true;

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                
                saveBackup(); // Create a backup before modifying the board
                let updatedCount = 0;
                let newCount = 0;

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    
                    const rows = {};
                    textContent.items.forEach(item => {
                        const y = Math.round(item.transform[5] / 4) * 4; 
                        if (!rows[y]) rows[y] = [];
                        rows[y].push(item.str.trim());
                    });

                    Object.values(rows).forEach(row => {
                        const cleanRow = row.filter(s => s !== '');
                        const rowStr = cleanRow.join(' ');
                        
                        const idMatch = rowStr.match(/\b(\d{4}-\d{4})\b/);
                        if (idMatch) {
                            const courseId = idMatch[1];
                            
                            // 1. Extract Grade
                            let parsedGrade = "";
                            const gradeMatch = rowStr.match(/(?:\b|\s)(0\d{2}|100|260|\*\*\*)(?:\b|\s)/);
                            if (gradeMatch && gradeMatch[1] !== "***" && gradeMatch[1] !== "260") {
                                parsedGrade = parseInt(gradeMatch[1], 10);
                            }

                            // 2. Extract Weight (First decimal number on the line)
                            let parsedWeight = 0;
                            const weightMatches = cleanRow.filter(s => /^\d+\.\d+$/.test(s));
                            if (weightMatches.length > 0) {
                                parsedWeight = parseFloat(weightMatches[0]);
                            }

                            // 3. Extract Hebrew Name (Stripped of \b operator for proper RTL extraction)
                            let extractedName = rowStr
                                .replace(/\d{4}-\d{4}/g, '') // Remove ID
                                .replace(/(?:\b|\s)(0\d{2}|100|260|\*\*\*)(?:\b|\s)/g, ' ') // Remove Grade safely
                                .replace(/\d+\.\d+/g, '') // Remove Weights/Hours
                                .replace(/ש'\+ת'|מע'|ש'|ש'ו'ת|ת'|סמ'/g, '') // Remove common teaching acronyms
                                .replace(/["']/g, '') // Clean up stray PDF quotes
                                .trim();
                            
                            extractedName = extractedName.replace(/\s+/g, ' '); // Clean multiple spaces
                            if (!extractedName) extractedName = "קורס שחולץ";

                            // Apply to Dashboard
                            const courseIndex = courses.findIndex(c => c.id === courseId);
                            if (courseIndex !== -1) {
                                // Update existing
                                courses[courseIndex].g = parsedGrade;
                                updatedCount++;
                            } else {
                                // CREATE NEW!
                                courses.push({
                                    id: courseId,
                                    name: extractedName,
                                    g: parsedGrade,
                                    w: parsedWeight
                                });
                                newCount++;
                            }
                        }
                    });
                }

                if(updatedCount > 0 || newCount > 0) {
                    render();
                    alert(`✅ Sync Complete!\nUpdated ${updatedCount} existing courses.\nAdded ${newCount} new courses.`);
                } else {
                    alert("⚠️ No matching grades found. Ensure this is the official TAU PDF.");
                }

            } catch (error) {
                console.error("PDF Parsing Error:", error);
                alert("❌ Could not read the PDF file. Please try again.");
            }

            syncBtn.innerText = originalText;
            syncBtn.disabled = false;
            event.target.value = ''; 
        }

        // --- RENDER & LOGIC ---
        function render() {
            const list = document.getElementById('course-list');
            list.innerHTML = '';
            
            if (courses.length === 0) {
                list.innerHTML = `<div class="empty-state">Your board is empty. Add a course manually or upload your PDF transcript to auto-fill.</div>`;
            } else {
                courses.forEach((c, i) => {
                    const div = document.createElement('div');
                    div.className = 'row';
                    div.draggable = true;
                    div.dataset.index = i;
                    
                    div.addEventListener('dragstart', dragStart);
                    div.addEventListener('dragover', dragOver);
                    div.addEventListener('drop', dragDrop);
                    div.addEventListener('dragenter', dragEnter);
                    div.addEventListener('dragleave', dragLeave);

                    div.innerHTML = `
                        <div class="drag-handle" title="Drag to reorder">⋮⋮</div>
                        <input type="text" class="hebrew-input" value="${c.name}" oninput="update(${i},'name',this.value)">
                        <input type="number" value="${c.g === '' ? '' : c.g}" placeholder="Grade" oninput="update(${i},'g',this.value)">
                        <input type="number" step="0.5" value="${c.w}" placeholder="Weight" oninput="update(${i},'w',this.value)">
                        <button class="remove-btn" onclick="remove(${i})" title="Remove">✕</button>`;
                    list.appendChild(div);
                });
            }
            calcAndChart();
        }

        function dragStart(e) {
            dragStartIndex = +e.target.closest('.row').dataset.index;
            e.target.closest('.row').classList.add('dragging');
        }
        function dragOver(e) { e.preventDefault(); }
        function dragEnter(e) { e.preventDefault(); e.target.closest('.row')?.classList.add('drag-over'); }
        function dragLeave(e) { e.target.closest('.row')?.classList.remove('drag-over'); }
        function dragDrop(e) {
            const dragEndIndex = +e.target.closest('.row').dataset.index;
            e.target.closest('.row')?.classList.remove('drag-over');
            const itemToMove = courses[dragStartIndex];
            courses.splice(dragStartIndex, 1);
            courses.splice(dragEndIndex, 0, itemToMove);
            render();
        }

        function update(i, field, val) {
            if (field === 'name') courses[i].name = val;
            else if (field === 'g') courses[i].g = val === '' ? '' : parseFloat(val);
            else courses[i].w = parseFloat(val) || 0;
            calcAndChart();
        }

        function addCourse() { 
            saveBackup();
            courses.push({ id: "custom-" + Date.now(), name: "קורס חדש", g: "", w: 0}); 
            render(); 
        }
        
        function remove(i) { 
            saveBackup(); 
            courses.splice(i,1); 
            render(); 
        }

        function calcAndChart() {
            let pts = 0, wts = 0;
            const validCourses = courses.filter(c => c.g !== "" && c.g !== null && c.g >= 0 && c.w > 0);
            
            validCourses.forEach(c => { pts += (c.g * c.w); wts += c.w; });
            
            const avg = wts > 0 ? (pts / wts).toFixed(2) : "0.00";
            document.getElementById('total-avg').innerText = avg;
            document.getElementById('total-credits').innerText = wts;
            
            // This is where it saves the empty array if you cleared the board
            try { localStorage.setItem('tau_grades_v8', JSON.stringify(courses)); } 
            catch(e) { console.warn("Could not save to local storage"); }

            updateChart(validCourses);
        }

        function updateChart(data) {
            if (typeof Chart === 'undefined') {
                document.getElementById('chart-error').style.display = 'block';
                return;
            }
            document.getElementById('chart-error').style.display = 'none';

            const ctx = document.getElementById('weightChart').getContext('2d');
            const labels = data.map(c => c.name);
            const weights = data.map(c => c.w);
            const grades = data.map(c => c.g);
            
            const bgColors = grades.map(g => {
                if (g >= 90) return 'rgba(40, 167, 69, 0.8)';
                if (g >= 80) return 'rgba(23, 162, 184, 0.8)';
                if (g >= 70) return 'rgba(255, 193, 7, 0.8)';
                return 'rgba(220, 53, 69, 0.8)';
            });

            if (chartInstance) {
                chartInstance.data.labels = labels;
                chartInstance.data.datasets[0].data = weights;
                chartInstance.data.datasets[0].backgroundColor = bgColors;
                chartInstance.data.datasets[0].grades = grades;
                chartInstance.update();
            } else {
                chartInstance = new Chart(ctx, {
                    type: 'doughnut',
                    data: { labels: labels, datasets: [{ data: weights, backgroundColor: bgColors, borderWidth: 1, grades: grades }] },
                    options: { responsive: true, plugins: { legend: { display: false }, tooltip: { callbacks: { label: function(c) { return ` משקל: ${c.raw} נק"ז | ציון: ${c.dataset.grades[c.dataIndex]}`; } } } } }
                });
            }
        }

        render();
    </script>
</body>
</html>
